<svg width="900" height="620" viewBox="0 0 900 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Solana mutation versus CKB replacement</title>
  <desc id="desc">A two-column comparison showing Solana programs mutating accounts in place and CKB scripts validating the replacement of input cells with output cells.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#1F2937"/>
    </marker>
    <style>
      .title { font: 700 30px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .section { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font: 600 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 600 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6D28D9; }
      .caption { font: 600 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="620" rx="24" fill="white"/>
  <text x="450" y="48" text-anchor="middle" class="title">Replacement Instead of Mutation</text>

  <rect x="50" y="95" width="325" height="355" rx="24" fill="#DBE4FF" fill-opacity="0.55" stroke="#4A9EED" stroke-width="2"/>
  <text x="212.5" y="132" text-anchor="middle" class="section" fill="#2563EB">Solana</text>
  <rect x="122" y="195" width="180" height="76" rx="18" fill="#A5D8FF" stroke="#4A9EED" stroke-width="2"/>
  <text x="212" y="241" text-anchor="middle" class="label">Program</text>
  <rect x="122" y="317" width="180" height="76" rx="18" fill="#C3FAE8" stroke="#22C55E" stroke-width="2"/>
  <text x="212" y="363" text-anchor="middle" class="label">Account</text>
  <line x1="212" y1="271" x2="212" y2="317" stroke="#1F2937" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="92" y="276" width="240" height="30" rx="15" fill="#FFF3BF"/>
  <text x="212" y="297" text-anchor="middle" class="caption">mutate in place</text>

  <rect x="525" y="95" width="325" height="355" rx="24" fill="#D3F9D8" fill-opacity="0.55" stroke="#22C55E" stroke-width="2"/>
  <text x="687.5" y="132" text-anchor="middle" class="section" fill="#15803D">CKB</text>
  <rect x="593" y="170" width="190" height="66" rx="18" fill="#FFF3BF" stroke="#F59E0B" stroke-width="2"/>
  <text x="688" y="211" text-anchor="middle" class="label">Input cells</text>
  <rect x="593" y="268" width="190" height="78" rx="18" fill="#D0BFFF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="688" y="315" text-anchor="middle" class="label">Scripts validate</text>
  <rect x="593" y="378" width="190" height="66" rx="18" fill="#B2F2BB" stroke="#22C55E" stroke-width="2"/>
  <text x="688" y="419" text-anchor="middle" class="label">Output cells</text>
  <line x1="688" y1="236" x2="688" y2="268" stroke="#1F2937" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="688" y1="346" x2="688" y2="378" stroke="#1F2937" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="545" y="315" class="small">lock</text>
  <text x="801" y="315" class="small" text-anchor="end">type</text>

  <rect x="90" y="492" width="720" height="74" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="450" y="536" text-anchor="middle" class="caption">CKB validates replacement of state objects instead of mutating them in place</text>
</svg>
